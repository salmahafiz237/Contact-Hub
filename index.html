<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="Contact-Hub">
   <title>ContactHub - Smart Contact Manager</title>
   <!--favicon-->
   <link rel="icon" href="images/favicon.png">
   <!--bootstrap-->
   <link rel="stylesheet" href="css/bootstrap.min.css">
   <!--fontawesome-->
   <link rel="stylesheet" href="css/all.min.css">
   <!--css-->
   <link rel="stylesheet" href="css/index.css">
   <!--media-->
   <link rel="stylesheet" href="css/media.css">
</head>
<body>
   <!--navbar-->
   <nav class="navbar navbar-expand-sm sticky-top navbar-custom z-3 py-3">
      <div class="container-fluid px-3 max-width-container">
   
         <a class="navbar-brand d-flex align-items-center gap-3" href="#">
            <div class="logo-square">
               <i class="fa-solid fa-address-book"></i>
            </div>
            <div class="d-flex flex-column justify-content-center">
               <h4 class="mb-0 fw-bold fs-4 logo-text">Contact<span style="color: #7F22FE;">Hub</span></h4>
               <small class="mt-0 fw-semibold d-none d-sm-block" style="color: #6A7282;">Smart Contact Manager</small>
            </div>
         </a>
   
         <div class="d-flex align-items-center gap-2 gap-sm-3 ms-auto">
            <button id="addContactBtn"
               class="btn btn-add-contact d-inline-flex align-items-center gap-2 px-sm-3 py-sm-2.5">
               <i class="fa-solid fa-plus text-xs"></i>
               <span class="d-none d-sm-inline">Add Contact</span>
               <span class="d-sm-none">Add</span>
            </button>

         <!-- <div class="collapse navbar-collapse" id="navbarSupportedContent"> -->
               <!-- Notification Button (Desktop) -->
               <button class="btn btn-icon d-none d-sm-flex">
                  <i class="fa-solid fa-bell"></i>
               </button>
               
               <!-- Settings Button (Desktop) -->
               <button class="btn btn-icon d-none d-sm-flex">
                  <i class="fa-solid fa-gear"></i>
               </button>
               <!-- Avatar -->
               <div class="profile-img-container">
                  <img src="images/avatar-4.jpg" alt="Profile" class="profile-img">
               <!-- </div> -->
         </div>
   </nav>



   <!-- bootstrap js -->
   <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
